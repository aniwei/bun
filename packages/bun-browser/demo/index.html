<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bun-browser demo</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1e1e1e;
      --surface: #252526;
      --border: #3c3c3c;
      --text: #d4d4d4;
      --accent: #0e639c;
      --accent-hover: #1177bb;
      --dim: #858585;
      --font-mono: "Cascadia Code", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      gap: 12px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .logo small {
      font-weight: 400;
      color: var(--dim);
      font-size: 0.8rem;
      margin-left: 4px;
    }

    .spacer {
      flex: 1;
    }

    .status-bar {
      font-size: 0.8rem;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ec9b0;
      display: inline-block;
    }

    /* ── Main split ─────────────────────────────────────── */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    @media (max-width: 640px) {
      .split {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
    }

    .panel {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--dim);
      flex-shrink: 0;
    }

    .panel-header span {
      flex: 1;
      font-weight: 500;
    }

    select,
    button {
      font-family: inherit;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      color: var(--text);
      padding: 3px 7px;
      cursor: pointer;
      outline: none;
    }

    button:hover:not(:disabled) {
      background: var(--border);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 3px 12px;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    textarea#code {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
      background: var(--surface);
      color: var(--text);
      border: none;
      resize: none;
      padding: 12px 14px;
      outline: none;
      tab-size: 2;
    }

    pre#output {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      padding: 12px 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      font-size: 0.72rem;
      color: var(--dim);
      text-align: center;
    }

    footer a {
      color: var(--dim);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="logo">bun-browser <small>WebAssembly demo</small></div>
      <select id="mode" title="执行模式">
        <option value="eval">eval 模式 (直接执行脚本)</option>
        <option value="run" selected>run 模式 (CJS + require)</option>
      </select>
      <button class="primary" id="run" disabled title="Ctrl+Enter">▶ 运行</button>
      <button id="clear">清空输出</button>
      <div class="spacer"></div>
      <div class="status-bar">
        <span class="status-dot"></span>
        <span id="status">初始化中 …</span>
      </div>
    </header>

    <div class="split">
      <div class="panel">
        <div class="panel-header"><span>编辑器</span><span style="color:#555">Ctrl+Enter 运行 · Tab 缩进</span></div>
        <textarea id="code" spellcheck="false">// bun-browser 运行时 demo
// 支持 CommonJS require、process.exit 等内置特性

function fizzbuzz(n) {
  const result = [];
  for (let i = 1; i <= n; i++) {
    if (i % 15 === 0)      result.push("FizzBuzz");
    else if (i % 3 === 0)  result.push("Fizz");
    else if (i % 5 === 0)  result.push("Buzz");
    else                   result.push(String(i));
  }
  return result;
}

const lines = fizzbuzz(20);
for (const line of lines) {
  console.log(line);
}

console.log("\n完成! bun-browser 运行在浏览器 WebAssembly 上 🎉");
</textarea>
      </div>

      <div class="panel">
        <div class="panel-header"><span>输出</span></div>
        <pre id="output"></pre>
      </div>
    </div>

    <footer>
      <a href="https://github.com/oven-sh/bun" target="_blank">github.com/oven-sh/bun</a>
      &nbsp;·&nbsp; bun-core.wasm · WebAssembly + JSI bridge
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>

</html>
